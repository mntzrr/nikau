[package]
name = "nikau"
version = "0.0.1"
edition = "2021"

[dependencies]
anyhow = "1.0"
async-channel = "1.5"
async-lock = "2.3"
async-std = { version = "1.8", features = ["tokio1"] }
async-trait = "0.1"
bit-vec = "0.6"
# waiting on fix in 0.5.2: https://github.com/cloudflare/boringtun/issues/340
boringtun = { git = "https://github.com/cloudflare/boringtun.git", rev = "878385f1" }
clap = { version = "4.0", features = ["derive", "env"] }
evdev = { version = "0.12", features = ["tokio"] }
futures = "0.3"
futures-core = "0.3"
futures-lite = "1"
rkyv = { version = "0.7", features = ["validation"] }
tide = { version = "0.16", default-features = false, features = ["h1-server"] }
toml = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
x25519-dalek = { version = "2.0.0-pre.1", features = ["reusable_secrets"] }
